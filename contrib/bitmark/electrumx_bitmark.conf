# ElectrumX configuration for Bitmark
#
# Source this file before running ElectrumX, or set these as environment
# variables in the systemd unit / your shell:
#   set -a; source /etc/electrumx-bitmark.conf; set +a
#   electrumx_server

# --- Coin ---
export COIN=Bitmark
export NET=mainnet

# --- Database ---
# Where ElectrumX stores its index. Needs to persist across reboots.
export DB_DIRECTORY=/var/lib/electrumx-bitmark

# --- Daemon (bitmarkd RPC) ---
# Must match your bitmark.conf rpcuser/rpcpassword and the RPC port (9266).
export DAEMON_URL=http://rpcuser:rpcpassword@127.0.0.1:9266/

# --- Services ElectrumX listens on ---
# tcp:// = plaintext Electrum protocol, ssl:// = TLS, rpc:// = local admin RPC.
# Empty host means listen on all interfaces. For SSL you must also set
# SSL_CERTFILE and SSL_KEYFILE below.
export SERVICES=tcp://:50001,rpc://

# To advertise this server publicly (Stage 3), set what peers should connect to:
# export REPORT_SERVICES=tcp://your.public.hostname:50001,ssl://your.public.hostname:50002

# --- SSL (optional, needed for ssl:// in SERVICES) ---
# export SSL_CERTFILE=/path/to/server.crt
# export SSL_KEYFILE=/path/to/server.key

# --- Tuning ---
export CACHE_MB=400
export LOG_LEVEL=info
# AuxPoW headers are large; ElectrumX raises the default itself, but you can
# bump these if initial sync complains about message sizes:
# export MAX_SEND=10000000
